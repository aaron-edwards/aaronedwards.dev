version: 2.1

jobs:
  checks:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Enable corepack
          command: sudo corepack enable
      - restore_cache:
          keys:
            - pnpm-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - run:
          name: Lint
          command: pnpm lint
      - run:
          name: Typecheck
          command: pnpm typecheck

  test:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Enable corepack
          command: sudo corepack enable
      - restore_cache:
          keys:
            - pnpm-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - run:
          name: Test
          command: pnpm test

  deploy-preview:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Enable corepack
          command: sudo corepack enable
      - restore_cache:
          keys:
            - pnpm-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - run:
          name: Build
          command: npx vercel build --cwd apps/web --token=$VERCEL_TOKEN
      - run:
          name: Deploy preview to Vercel
          command: npx vercel deploy --prebuilt --cwd apps/web --token=$VERCEL_TOKEN

  deploy-production:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Enable corepack
          command: sudo corepack enable
      - restore_cache:
          keys:
            - pnpm-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          key: pnpm-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - run:
          name: Build
          command: npx vercel build --cwd apps/web --prod --token=$VERCEL_TOKEN
      - run:
          name: Deploy to Vercel production
          command: npx vercel deploy --prebuilt --cwd apps/web --prod --token=$VERCEL_TOKEN

workflows:
  ci:
    jobs:
      - checks
      - test
      - deploy-preview:
          requires:
            - checks
            - test
          filters:
            branches:
              ignore: main
      - deploy-production:
          requires:
            - checks
            - test
          filters:
            branches:
              only: main
